<!doctype html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Clarior CRM — Premium Customer Relationship Management</title>
    <meta name="description" content="Clarior CRM — A professional SaaS platform for managing customers, leads, tasks, and analytics." />
    <meta name="keywords" content="CRM, Customer Management, Leads, Tasks, Sales, Analytics" />
    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
    <!-- No-flicker theme script: runs before React renders -->
    <script>
      (function () {
        var t = localStorage.getItem("clarior-theme") || "dark";
        document.documentElement.setAttribute("data-theme", t);
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
